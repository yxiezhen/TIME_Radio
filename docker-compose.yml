version: '3.8'

services:
  unblock-music:
    build: ../unblock-music
    container_name: unblock-music
    restart: unless-stopped
    networks:
      - radio-net

  radio-time-machine:
    build: .
    container_name: radio-time-machine
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - PORT=3456
      - UNBLOCK_URL=http://unblock-music:3002
      - MIMO_API_KEY=${MIMO_API_KEY}
      - DEEPSEEK_KEY=${DEEPSEEK_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      - unblock-music
    networks:
      - radio-net

networks:
  radio-net:
    driver: bridge
